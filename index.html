<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ポジション判定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .penlight {
            color: #888;
            font-size: 0.9em;
            margin-left: 10px;
        }

        strong {
            color: #333;
        }
    </style>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            padding: 10px;
            background-color: #f9f9f9;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            /* 幅がはみ出さないように */
            padding: 10px;
            font-size: 16px;
            /* iPhoneで入力時にズームされないサイズ */
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 5px 2px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
            background: #fff;
        }

        #result {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-top: 10px;
        }

        strong {
            color: #333;
        }
    </style>
</head>

<body>

    <h2>今日のメンバー入力</h2>
    <button onclick="selectShow('kokokarada')">ここからだ</button>
    <button onclick="selectShow('reset')">RESET</button><br>

    <textarea id="members" rows="3" cols="80"></textarea><br>
    <button onclick="checkPositions()">判定</button>

    <h2>結果</h2>
    <div id="result"></div>

    <script src="7.js"></script>
</body>

</html>
